name: Build ZCinema iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Build IPA
        run: |
          xcodebuild -project ZCinema.xcodeproj \
                     -scheme ZCinema \
                     -sdk iphoneos \
                     -configuration Release \
                     archive -archivePath $PWD/build/ZCinema.xcarchive
          
          xcodebuild -exportArchive \
                     -archivePath $PWD/build/ZCinema.xcarchive \
                     -exportOptionsPlist exportOptions.plist \
                     -exportPath $PWD/build/output
