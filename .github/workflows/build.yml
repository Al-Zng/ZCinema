name: Build ZCinema IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  SCHEME: ZCinema
  PROJECT: ZCinema.xcodeproj
  BUNDLE_ID: com.zcinema.app

jobs:
  build:
    name: Build & Export
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 15.0
        run: |
          sudo xcode-select -s /Applications/Xcode_15.0.app/Contents/Developer
          xcodebuild -version

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies -project "${{ env.PROJECT }}" -scheme "${{ env.SCHEME }}"

      - name: Build and Archive
        run: |
          # بناء المشروع وإنشاء الأرشيف في مجلد مؤقت
          xcodebuild archive \
            -project "${{ env.PROJECT }}" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "${{ runner.temp }}/ZCinema.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Create IPA
        run: |
          # التأكد من وجود المجلدات المطلوبة
          mkdir -p "${{ runner.temp }}/Payload"
          
          # البحث عن ملف الـ .app داخل الأرشيف ونسخه إلى Payload
          APP_PATH=$(find "${{ runner.temp }}/ZCinema.xcarchive/Products/Applications" -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ Error: Could not find .app file in archive"
            exit 1
          fi
          
          cp -r "$APP_PATH" "${{ runner.temp }}/Payload/"
          
          # ضغط مجلد Payload لإنشاء ملف IPA
          cd "${{ runner.temp }}"
          zip -r ZCinema-unsigned.ipa Payload/
          echo "✅ IPA created successfully"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ZCinema-IPA
          path: ${{ runner.temp }}/ZCinema-unsigned.ipa
